<!DOCTYPE html>
<html>
  <style>
    @keyframes softBlink {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.9; }
    }
    .thinking-text {
      animation: softBlink 1.5s infinite ease-in-out;
      font-style: italic;
      color: #5a5a5a;
    }
  </style>
  <body style="
  margin: 0;
  overflow: hidden;
  background: linear-gradient(#7ec8ff, #bfe6ff);
  ">
    <div id="cube"></div>
    <div id="response" style="
      position: absolute;
      bottom: 80px;
      width: 100%;
      color: #2b2b2b;
      opacity: 0.8;
      transition: all 0.2s ease-in-out;
      text-align: center;
      font-size: 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    ">
      hey... i’m here... how are you feeling..?
    </div>
    <input id="input" placeholder="say something..."
      style="
      transition: opacity 0.3s ease;
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      width: 60%;
      text-align: center;
      font-size: 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    ">
    <div id="settingsBtn" style="
        position: absolute;
        top: 20px;
        right: 20px;
        cursor: pointer;
        font-size: 24px;
        transition: opacity 0.3s;
        z-index: 100;
    ">⚙️</div>
    <div id="settingsPopup" style="
        display: none;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.3);
        backdrop-filter: blur(5px);
        z-index: 1000;
        align-items: center;
        justify-content: center;
    ">
        <div style="
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 500px;
            text-align: center;
            font-size: 25px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        ">
            <h3 style="margin: 0; color: #5a5a5a; font-weight: 600;">little amethyst settings</h3>      
            <div style="margin: 5px 0 25px 0; font-size: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #a0a0a0; line-height: 1.4;">
                if you don't have a key yet... you can find one at <br>
                <a href="https://aistudio.google.com/api-keys" 
                  target="_blank" 
                  style="color: #00aae2; text-decoration: none; font-weight: 500;">aistudio.google.com/api-keys</a>
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-size: 20px;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #5a5a5a;">api key</label>
                <input id="apiKeyInput" type="password" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #eee; box-sizing: border-box; background: #fcfcfc;">
            </div>
            <div style="margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 8px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 20px; color: #5a5a5a;">model choice</label>
                <select id="modelSelect" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                font-size: 17px; box-sizing: border-box; background: #fcfcfc;">
                    <option value="gemma-3-4b-it">gemma-3-4b-it (fast)</option>
                    <option value="gemma-3-12b-it">gemma-3-12b-it (smart)</option>
                </select>
            </div>
            <button id="saveSettings" style="
                background: #7ec8ff;
                color: white;
                border: none;
                padding: 12px 20px;
                border-radius: 12px;
                cursor: pointer;
                width: 100%;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                font-size: 20px;
                transition: opacity 0.2s;
            ">save and close</button>
        </div>
    </div>
    <script src="cube.js"></script>
  </body>
</html>
<script>
// assign variables
  const input = document.getElementById("input");
  const response = document.getElementById("response");
  const { getResponse } = require('./ai');
  const settingsBtn = document.getElementById('settingsBtn');
  const settingsPopup = document.getElementById('settingsPopup');
  const saveBtn = document.getElementById('saveSettings');

// settings button
  settingsBtn.onclick = () => settingsPopup.style.display = 'flex';

// save and close button
  saveBtn.onclick = () => {
      localStorage.setItem('little_amethyst_api_key', document.getElementById('apiKeyInput').value);
      localStorage.setItem('little_amethyst_model', document.getElementById('modelSelect').value);
      
      settingsPopup.style.display = 'none';
  };

// load saved settings on startup
  window.onload = () => {
      if(localStorage.getItem('little_amethyst_api_key')) {
          document.getElementById('apiKeyInput').value = localStorage.getItem('little_amethyst_api_key');
      }
      if(localStorage.getItem('little_amethyst_model')) {
          document.getElementById('modelSelect').value = localStorage.getItem('little_amethyst_model');
      }
  };

// unused random thinking messages
  const thinkingMessages = [
    "thinking…",
    "mhm… give me a second…",
    "i’m thinking about what you said…",
    "just a moment…",
    "let me think…",
    "processing your words…"
  ];

// unused random thinking messages function
  function getThinkingMessage() {
    return thinkingMessages[Math.floor(Math.random() * thinkingMessages.length)];
  }

// thinking effect
  function react() {
    targetSpinSpeed = 0.08;
    targetGlow = 0.6;
    setTimeout(() => {
      targetSpinSpeed = 0.01;
      targetGlow = 0;
    }, 800);
  }

// when enter key is pushed
input.addEventListener("keydown", async (e) => {
  if (e.key === "Enter") {
    const text = input.value.trim();
    const responseDiv = document.getElementById("response");

    if (!text) {
      return; 
    }

    input.style.opacity = 0;
    input.disabled = true;
    window.startThinking();
    responseDiv.innerText = "thinking...";
    responseDiv.classList.add("thinking-text");
    
    let isFirstChunk = true;

    try {
      await getResponse(text, (chunk) => {
        if (isFirstChunk) {
          responseDiv.innerText = "";
          responseDiv.classList.remove("thinking-text");
          isFirstChunk = false;
        }
        responseDiv.innerText += chunk;
      });
    } catch (error) {
      responseDiv.classList.remove("thinking-text");

      if (error === "no_key") {
        responseDiv.innerText = "mnh... i don't have my key yet... could you check the settings for me..?";
      } else if (error === "server_overload") {
        responseDiv.innerText = "mhm... the stars are too loud... let's try again in a bit...";
      } else {
        responseDiv.innerText = "mnh... my head feels a bit fuzzy... can you say that again..?";
      }
    }

    input.value = "";
    input.style.opacity = 1;
    input.disabled = false;
    window.stopThinking();
    input.focus();
  }
});
</script>
